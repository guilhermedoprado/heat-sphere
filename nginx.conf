events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # 1. Python
        location /api/heat-exchangers/ {
            proxy_pass http://heatsphere-python.internal.whitefield-dc96e279.brazilsouth.azurecontainerapps.io;
            proxy_http_version 1.1;
        }

        location /api/external-flow/ {
            proxy_pass http://heatsphere-python.internal.whitefield-dc96e279.brazilsouth.azurecontainerapps.io;
            proxy_http_version 1.1;
        }

        # 2. C#
        location /api/notes/ {
            proxy_pass http://heatsphere-csharp.internal.whitefield-dc96e279.brazilsouth.azurecontainerapps.io;
            proxy_http_version 1.1;
        }

        location /api/productivity {
            proxy_pass http://heatsphere-csharp.internal.whitefield-dc96e279.brazilsouth.azurecontainerapps.io;
            proxy_http_version 1.1;
        }
    }
}
