events {
    worker_connections 1024;
}

http {
    server {
        # O Gateway vai rodar na porta 8080
        listen 80;

        # Configuração de CORS centralizada no Gateway
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # 1. Tudo que for cálculo vai para o Python
        location /api/heat-exchangers/ {
            proxy_pass heatsphere-python.internal.whitefield-dc96e279.brazilsouth.azurecontainerapps.io;
        }

        location /api/external-flow/ {
            proxy_pass heatsphere-python.internal.whitefield-dc96e279.brazilsouth.azurecontainerapps.io;
        }

        # 2. Tudo que for notas/banco de dados vai para o C#
        location /api/notes/ {
            proxy_pass heatsphere-csharp.internal.whitefield-dc96e279.brazilsouth.azurecontainerapps.io; # Ajuste para a porta interna do seu C#
        }

        location /api/productivity {
            proxy_pass heatsphere-csharp.internal.whitefield-dc96e279.brazilsouth.azurecontainerapps.io;
        }

        # 3. Futuro: Autenticação, Geração de PDF, etc.
        # location /api/pdf/ { ... }
    }
}
