server {
  listen 80;

  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_set_header Host $proxy_host;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Real-IP $remote_addr;

  resolver 127.0.0.11 valid=30s ipv6=off;

  set $csharp_upstream http://heatsphere_core_api:8080;
  set $python_upstream http://heatsphere_math_service:8000;

  location ^~ /api/notes             { proxy_pass $csharp_upstream; }
  location ^~ /api/auth/             { proxy_pass $csharp_upstream; }
  location ^~ /api/productivity/     { proxy_pass $csharp_upstream; }
  location ^~ /api/heat-exchangers/ { proxy_pass $python_upstream; }
  location ^~ /api/external-flow/   { proxy_pass $python_upstream; }
}
