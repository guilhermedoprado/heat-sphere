server {
  listen 80;

  add_header 'Access-Control-Allow-Origin' '*' always;
  add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
  add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;

  if ($request_method = 'OPTIONS') { return 204; }

  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_set_header Host $proxy_host;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Proto http;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Real-IP $remote_addr;

  # Nomes dos serviços dentro da rede Docker local
  set $csharp_upstream http://csharp_api:8080;
  set $python_upstream http://py_service:8000;

  location = /api/notes         { return 301 /api/notes/; }
  location ^~ /api/notes/           { proxy_pass $csharp_upstream; }
  location ^~ /api/productivity/    { proxy_pass $csharp_upstream; }
  location ^~ /api/heat-exchangers/ { proxy_pass $python_upstream; }
  location ^~ /api/external-flow/   { proxy_pass $python_upstream; }
}
