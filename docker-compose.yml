services:
  # 1. API GATEWAY (Nginx)
  gateway:
    image: nginx:alpine
    container_name: heatsphere_gateway
    ports:
      - "8080:80"
    volumes:
      - ./default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - go_service
      - csharp_api
    networks:
      - heatsphere

  # 2. O MICROSSERVIÇO DE CÁLCULOS (Go — migrado de Python)
  go_service:
    build:
      context: ./go_service
      dockerfile: Dockerfile
    container_name: heatsphere_go_service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    networks:
      - heatsphere

  # 3. BACKEND C# (Banco, Regras de Negócio, Autenticação)
  csharp_api:
    image: ${DOCKER_REGISTRY-}heatsphereapi
    build:
      context: ./backend
      dockerfile: HeatSphere.Api/Dockerfile
    container_name: heatsphere_core_api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=ep-falling-thunder-a85hlmu6-pooler.eastus2.azure.neon.tech;Database=neondb;Username=neondb_owner;Password=npg_bXBvc78CYmqQ;Ssl Mode=Require
      - DOTNET_EnableGCRegions=0
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - heatsphere

  # 4. O BANCO DE DADOS
  postgres_db:
    image: postgres:15-alpine
    container_name: heatsphere_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cguib00m.
      POSTGRES_DB: heatspheredb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - heatsphere

  # 5. O SEU FRONTEND REACT
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: heatsphere_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_PROXY_TARGET=http://gateway:80
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - heatsphere

networks:
  heatsphere:
    name: heatsphere_net
