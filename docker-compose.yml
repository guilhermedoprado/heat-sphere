services:
  # 1. O SEU NOVO API GATEWAY
  gateway:
    image: nginx:alpine
    container_name: heatsphere_gateway
    ports:
      - "8080:80" # O Frontend vai chamar localhost:8080
    volumes:
      - ./default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - py_service
      - csharp_api

  # 2. O MICROSSERVIÇO PYTHON (Matemática)
  py_service:
    build:
      context: ./py_service
      dockerfile: Dockerfile
    container_name: heatsphere_math_service
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  # 3. O SEU BACKEND C# (Banco, Regras de Negócio, Autenticação)
  csharp_api:
    image: ${DOCKER_REGISTRY-}heatsphereapi
    build:
      context: ./backend
      dockerfile: HeatSphere.Api/Dockerfile
    container_name: heatsphere_core_api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres_db;Database=heatspheredb;Username=postgres;Password=cguib00m.
      - DOTNET_EnableGCRegions=0
    depends_on:
      postgres_db:
        condition: service_healthy

  # 4. O BANCO DE DADOS
  postgres_db:
    image: postgres:15-alpine
    container_name: heatsphere_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: cguib00m.
      POSTGRES_DB: heatspheredb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 5. O SEU FRONTEND REACT
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: heatsphere_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
