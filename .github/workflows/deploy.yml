name: CI/CD - Build, Push, Deploy (ACA)

on:
  push:
    branches: [ main ]

env:
  RG: rg-heatsphere-prod
  ACR: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # (Opcional mas recomendado) testes/builds antes de publicar
      - name: Frontend build
        run: |
          cd frontend
          npm ci
          npm run build

      - name: C# tests
        run: |
          dotnet test ./backend/HeatSphere.Api/HeatSphere.Api.csproj

      - name: Python tests
        run: |
          pip install -r py_service/requirements.txt
          pip install -r py_service/requirements-dev.txt
          pytest -q py_service

      - name: Docker login ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push C#
        run: |
          docker build -t $ACR/heatsphere-csharp:${{ github.sha }} -t $ACR/heatsphere-csharp:latest -f backend/HeatSphere.Api/Dockerfile ./backend
          docker push $ACR/heatsphere-csharp:${{ github.sha }}
          docker push $ACR/heatsphere-csharp:latest

      - name: Build & push Python
        run: |
          docker build -t $ACR/heatsphere-python:${{ github.sha }} -t $ACR/heatsphere-python:latest -f py_service/Dockerfile ./py_service
          docker push $ACR/heatsphere-python:${{ github.sha }}
          docker push $ACR/heatsphere-python:latest

      - name: Build & push Gateway
        run: |
          docker build -t $ACR/heatsphere-gateway:${{ github.sha }} -t $ACR/heatsphere-gateway:latest -f nginx.Dockerfile .
          docker push $ACR/heatsphere-gateway:${{ github.sha }}
          docker push $ACR/heatsphere-gateway:latest

      - name: Build & push Frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t $ACR/heatsphere-frontend:${{ github.sha }} \
            -t $ACR/heatsphere-frontend:latest \
            -f frontend/Dockerfile ./frontend
          docker push $ACR/heatsphere-frontend:${{ github.sha }}
          docker push $ACR/heatsphere-frontend:latest

      # Deploy de verdade (aplica a nova imagem -> nova revision)
      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Container Apps (single revision mode)
        run: |
          az extension add --name containerapp --upgrade

          az containerapp revision set-mode -n heatsphere-csharp   -g $RG --mode single
          az containerapp revision set-mode -n heatsphere-python   -g $RG --mode single
          az containerapp revision set-mode -n heatsphere-gateway  -g $RG --mode single
          az containerapp revision set-mode -n heatsphere-frontend -g $RG --mode single

          az containerapp update -n heatsphere-csharp   -g $RG --image $ACR/heatsphere-csharp:${{ github.sha }} --min-replicas 1
          az containerapp update -n heatsphere-python   -g $RG --image $ACR/heatsphere-python:${{ github.sha }} --min-replicas 1
          az containerapp update -n heatsphere-gateway  -g $RG --image $ACR/heatsphere-gateway:${{ github.sha }} --min-replicas 1
          az containerapp update -n heatsphere-frontend -g $RG --image $ACR/heatsphere-frontend:${{ github.sha }} --min-replicas 1
