server {
  listen 80;

  add_header 'Access-Control-Allow-Origin' '*' always;
  add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
  add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;

  if ($request_method = 'OPTIONS') { return 204; }

  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_set_header Host $proxy_host;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Real-IP $remote_addr;

  resolver 127.0.0.11 valid=30s ipv6=off;

  set $csharp_upstream http://heatsphere-csharp.internal.whitefield-dc96e279.brazilsouth.azurecontainerapps.io;
  set $python_upstream http://heatsphere-python.internal.whitefield-dc96e279.brazilsouth.azurecontainerapps.io;

  location = /api/notes         { return 301 /api/notes/; }
  location ^~ /api/notes/           { proxy_pass $csharp_upstream; }
  location ^~ /api/productivity/    { proxy_pass $csharp_upstream; }
  location ^~ /api/heat-exchangers/ { proxy_pass $python_upstream; }
  location ^~ /api/external-flow/   { proxy_pass $python_upstream; }
}
