server {
  listen 80;

  add_header 'Access-Control-Allow-Origin' '*' always;
  add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
  add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;

  if ($request_method = 'OPTIONS') { return 204; }

    proxy_set_header Host $proxy_host;                 # ou simplesmente remova; esse é o default
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;

  location ^~ /api/heat-exchangers/ { proxy_pass http://heatsphere-python; }
  location ^~ /api/external-flow/   { proxy_pass http://heatsphere-python; }

  location = /api/notes { return 301 /api/notes/; }
  location ^~ /api/notes/ { proxy_pass http://heatsphere-csharp; }

  location ^~ /api/productivity/ { proxy_pass http://heatsphere-csharp; }
}
